<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC Launcher - Page Introuvable</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --container-bg: #11111b;
            --accent-color: #a6e3a1;
            --text-color: #cdd6f4;
            --text-muted: #a6adc8;
            --border-color: #313244;
            --red: #f38ba8;
            --peach: #fab387;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .error-container {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .error-code {
            font-size: 5rem;
            font-weight: bold;
            color: var(--red);
            line-height: 1;
            margin-bottom: 10px;
        }

        .error-title {
            font-size: 1.5rem;
            color: #ffffff;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .error-message {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .btn-home {
            display: inline-block;
            background-color: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .btn-home:hover {
            background-color: var(--accent-color);
            color: #11111b;
        }
    </style>
</head>
<body>

    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Mince, ce chunk n'est pas chargé !</h1>
        <p class="error-message">
            La page que vous recherchez a été déplacée ou n'existe plus. Vérifiez l'adresse ou retournez à l'abri.
        </p>
        <a href="https://bowser245.github.io/mc-opti" class="btn-home">Retourner à l'accueil</a>
    </div>

</body>
</html>
