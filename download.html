<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Custom Launcher - Téléchargement</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --container-bg: #11111b;
            --accent-color: #a6e3a1;
            --text-color: #cdd6f4;
            --text-muted: #a6adc8;
            --card-bg: #181825;
            --border-color: #313244;
            --blue: #89b4fa;
            --red: #f38ba8;
            --peach: #fab387;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        nav {
            background-color: var(--container-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--red);
            text-decoration: none;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
        }

        nav ul li a:hover {
            color: var(--accent-color);
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
            text-align: center;
        }

        .download-box {
            background-color: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 30px;
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        /* --- NOUVEAU STYLE POUR LA SÉLECTION D'OS --- */
        .os-selection {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .os-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 30px;
            width: 240px;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .os-card:hover {
            border-color: var(--blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(137, 180, 250, 0.15);
        }

        .os-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            object-fit: contain;
        }

        .os-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            margin: 5px 0;
        }

        .os-extension {
            font-family: monospace;
            background-color: var(--container-bg);
            color: var(--peach);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-top: 10px;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">MC LAUNCHER</a>
        
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="index.html#features">Fonctionnalités</a></li>
            <li><a href="index.html#actualites">Actualités</a></li>
            <li><a href="resourcepack.html">Pack</a></li>
            <li><a href="wiki.html">Wiki</a></li>
            <li><a href="status.html">Statut</a></li>
            <li><a href="credits.html">Crédits</a></li>
            <li><a href="download.html" class="nav-btn">Télécharger</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Téléchargement</h1>
        <p class="subtitle">Mais juste avant, sur quel outil vous allez le faire tournez ?</p>

        <div class="download-box">
            <div class="os-selection">
                <a href="download/windows.html" class="os-card">
                    <img src="os-icons/windows.png" alt="Windows" class="os-icon">
                    <span class="os-name">Windows</span>
                    <span class="os-extension">.exe</span>
                </a>

                <a href="download/linux.html" class="os-card">
                    <img src="os-icons/linux.png" alt="Linux" class="os-icon">
                    <span class="os-name">Linux</span>
                    <span class="os-extension">.tar.gz</span>
                </a>
                <a href="download/python.html" class="os-card">
                    <img src="os-icons/python.svg" alt="Python" class="os-icon">
                    <span class="os-name">Python</span>
                    <span class="os-extension">.py</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
